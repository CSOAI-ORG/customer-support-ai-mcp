name: customer-support-ai-mcp
description: Customer Support Ai automation via MCP. Includes classify ticket, draft
  response, analyze sentiment. By MEOK AI Labs.
version: 1.0.0
tools:
- name: classify_ticket
  description: Classify a support ticket by category, priority, and routing.
  parameters:
  - name: subject
    type: string
    required: true
  - name: body
    type: string
    required: true
  - name: customer_tier
    type: string
    required: false
- name: draft_response
  description: Draft a customer support response based on ticket category.
  parameters:
  - name: category
    type: string
    required: true
  - name: customer_name
    type: string
    required: false
  - name: issue_summary
    type: string
    required: false
  - name: tone
    type: string
    required: false
  - name: include_steps
    type: boolean
    required: false
- name: analyze_sentiment
  description: Analyze customer message sentiment to gauge satisfaction.
  parameters:
  - name: messages
    type: array
    required: true
- name: detect_escalation
  description: Detect if a support ticket needs escalation to management.
  parameters:
  - name: messages
    type: array
    required: true
  - name: ticket_age_hours
    type: number
    required: false
  - name: response_count
    type: integer
    required: false
  - name: customer_tier
    type: string
    required: false
- name: generate_faq
  description: Generate FAQ entries from common support ticket patterns.
  parameters:
  - name: tickets
    type: array
    required: true
  - name: max_faqs
    type: integer
    required: false
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
    - apiKey
    properties:
      apiKey:
        type: string
        description: Your MEOK API Key
  commandFunction: "(config) => ({\n  command: 'uvx',\n  args: ['customer-support-ai-mcp',\
    \ '--api-key', config.apiKey],\n  env: {\n    MEOK_API_KEY: config.apiKey\n  }\n\
    })"
